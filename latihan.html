<!doctype html>
<html lang="en">
  <head>
    <title>My First Website</title>
    <link rel="stylesheet" href="latihan.css" />
  </head>
  <body>
    <!-- Title -->
    <h1>Welcome</h1>

    <!-- Paragraph -->
    <p id="text">Hello, this is my first website</p>

    <!-- Button -->
    <button onclick="changeText()">Click Me</button>

    <!-- JavaScript -->
    <script>
      // Function to change the text when button is clicked
      function changeText() {
        document.getElementById("text").textContent = "Button was clicked!";
      }
    </script>
  </body>
</html>
